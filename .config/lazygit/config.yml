# lazygit 設定。
# 環境変数 LG_CONFIG_FILE でこのファイルを読み込ませる（nix-config の shell.nix で設定）。

# output = "terminal" のサブプロセス終了後に出る
# 「Press enter to return to lazygit」の確認を省く。
promptToReturnFromSubprocess: false

gui:
  # loadingText 表示時のスピナーが速すぎるので、回転を緩める（デフォルト 50ms → 100ms）。
  spinner:
    rate: 200

git:
  # diff ビューをシンタックスハイライト付きで表示するため delta をページャーに使う。
  # 配色は nvim snacks picker (<leader>gD) の fancy diff (tokyonight-moon) に合わせる。
  # syntax テーマは .config/bat/themes/tokyonight_moon.tmTheme (要 `bat cache --build`)。
  pagers:
    - colorArg: always
      pager: >-
        delta --paging=never --line-numbers
        --syntax-theme=tokyonight_moon
        --minus-style='syntax #4b2a3d' --minus-non-emph-style='syntax #4b2a3d'
        --minus-emph-style='syntax #6b2e43' --minus-empty-line-marker-style='syntax #4b2a3d'
        --plus-style='syntax #2a4556' --plus-non-emph-style='syntax #2a4556'
        --plus-emph-style='syntax #305f6f' --plus-empty-line-marker-style='syntax #2a4556'
        --line-numbers-minus-style='#e26a75' --line-numbers-plus-style='#b8db87'
        --line-numbers-zero-style='#3b4261'
        --line-numbers-left-format='{nm:>4} ' --line-numbers-right-format='{np:>4}  '
        --hunk-header-style='line-number syntax' --hunk-header-decoration-style='#3b4261 box'
        --hunk-header-line-number-style='#82aaff'
        --file-style='#82aaff bold' --file-decoration-style='#3b4261 ul'

customCommands:
  # `C`（shift-c）を上書きし、空のコミットメッセージ入力欄を出す。
  # 空のままエンターすると、選択中ファイルの git status を見て
  # 新規追加なら "create <file>"、削除なら "delete <file>"、それ以外は "update <file>" でコミットする。
  # 何か入力すればその文面がそのまま使われる。
  - key: C
    context: files
    description: "Commit (empty = create/delete/update <file>)"
    prompts:
      - type: input
        title: "{{ if .SelectedFile }}Commit {{ .SelectedFile.Name }} (empty = auto){{ else }}Commit message{{ end }}"
        key: Msg
    command: |
      msg="{{ .Form.Msg }}"
      if [ -z "$msg" ]; then
        files=$(git diff --cached --name-only)
        count=$(printf '%s\n' "$files" | grep -c .)
        if [ "$count" -eq 1 ]; then
          st=$(git status --porcelain -- "$files" | cut -c1-2)
          case "$st" in
            A*) verb=create ;;
            *D*) verb=delete ;;
            *)  verb=update ;;
          esac
          msg="$verb $files"
        fi
      fi
      if [ -z "$msg" ]; then
        echo "commit message required (multiple staged files)" >&2
        exit 1
      fi
      git commit -m "$msg"

  # どの画面でも `X` を押すと、gh で取得したオープン PR の一覧から選択して checkout する。
  # (`X` は lazygit v0.61.1 の全コンテキストでデフォルト未使用。他の空きは I / U / Y)
  # 一覧は「#番号 タイトル 作者 ブランチ」を色付き・列揃えで表示する。
  # レビュー状態は番号の色で表現: シアン=未レビュー / マゼンタ=draft / 緑=approved / 赤=changes requested。
  # タイトルは全角文字を幅 2 として数え、表示幅 50 セルで切り詰め・パディングする (jq の truncpad)。
  # Go テンプレートの printf は rune 数でしか揃えられず日本語で列がずれるため、jq 側で揃える。
  # 注意: lazygit はプロンプトの command をシェルではなく自前の ToArgv で分割し、
  # シングルクォート内でもバックスラッシュをエスケープとして消費するため、
  # jq の文字列補間 "\(.number)" や "\t" は使えない (@tsv でタブ区切りにする)。
  - key: X
    context: global
    description: "Checkout PR from list"
    prompts:
      - type: menuFromCommand
        title: "Select PR"
        key: PrNumber
        command: >-
          gh pr list --limit 30 --json number,title,headRefName,author,isDraft,reviewDecision
          --jq 'def truncpad($w):
          [explode[] | [., (if . >= 4352 then 2 else 1 end)]] as $cs
          | reduce $cs[] as $i ({s:[], n:0, done:false};
          if (.done|not) and (.n + $i[1] <= $w)
          then {s:(.s+[$i[0]]), n:(.n+$i[1]), done:false}
          else .done = true end)
          | (.s|implode) + ((" " * ($w - .n)) // "");
          .[] | [(.number|tostring),
          (if .isDraft then "DRAFT"
          elif .reviewDecision == "APPROVED" then "APPROVED"
          elif .reviewDecision == "CHANGES_REQUESTED" then "CHANGES"
          else "PENDING" end),
          .author.login, .headRefName, (.title | truncpad(50))] | @tsv'
        filter: '(?P<number>\d+)\t(?P<status>[^\t]*)\t(?P<author>[^\t]*)\t(?P<branch>[^\t]*)\t(?P<title>.*)'
        valueFormat: "{{ .number }}"
        labelFormat: '{{ if eq .status "DRAFT" }}{{ printf "#%-5s" .number | magenta | bold }}{{ else if eq .status "APPROVED" }}{{ printf "#%-5s" .number | green | bold }}{{ else if eq .status "CHANGES" }}{{ printf "#%-5s" .number | red | bold }}{{ else }}{{ printf "#%-5s" .number | cyan | bold }}{{ end }} {{ .title }} {{ printf "%-12.12s" .author | yellow }} {{ .branch | green }}'
    command: gh pr checkout {{ .Form.PrNumber }}
    loadingText: "Checking out PR..."

  # `c` を上書きし、ステージ済み diff から claude でコミットメッセージを生成して即コミットする。
  # 別ウィンドウ（terminal サブプロセスや nvim）を出さず、生成中は loadingText のスピナーを表示する。
  # 生成メッセージを編集したい場合は、コミット後に `r`（reword）で内蔵パネルから直す。
  - key: c
    context: files
    description: "Commit (LLM-generated message)"
    loadingText: "Generating commit message with claude..."
    command: "$HOME/.config/lazygit/llm-commit-msg.sh"
    output: log
