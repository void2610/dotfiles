prSections:
    - title: All Open
      filters: is:open sort:updated-desc
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: All Open
      filters: is:open sort:updated-desc
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
        height: 0.6
        position: auto
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            labels:
                width: 22
                hidden: true
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    prs:
        - key: m
          name: merge
          command: 'printf "Merge method [M/s/r]: "; read mm; case "$mm" in [sS]*) method=--squash ;; [rR]*) method=--rebase ;; *) method=--merge ;; esac; printf "Delete remote branch? [Y/n] "; read a; case "$a" in [nN]*) d= ;; *) d=--delete-branch ;; esac; gh pr merge --repo {{.RepoName}} {{.PrNumber}} $method $d'
        - key: e
          name: edit
          # 1行目=タイトル / 2行目空行 / 3行目以降=本文 としてまとめて編集する。$NVIM を外しネスト警告を回避する。
          command: |
            f=$(mktemp); b=$(mktemp)
            gh pr view {{.PrNumber}} --repo {{.RepoName}} --json title,body --jq '.title + "\n\n" + .body' > "$f"
            env -u NVIM nvim "$f"
            title=$(sed -n '1p' "$f"); sed -n '3,$p' "$f" > "$b"
            gh pr edit {{.PrNumber}} --repo {{.RepoName}} --title "$title" --body-file "$b"
            rm -f "$f" "$b"
    issues:
        - key: e
          name: edit
          # 1行目=タイトル / 2行目空行 / 3行目以降=本文 としてまとめて編集する。$NVIM を外しネスト警告を回避する。
          command: |
            f=$(mktemp); b=$(mktemp)
            gh issue view {{.IssueNumber}} --repo {{.RepoName}} --json title,body --jq '.title + "\n\n" + .body' > "$f"
            env -u NVIM nvim "$f"
            title=$(sed -n '1p' "$f"); sed -n '3,$p' "$f" > "$b"
            gh issue edit {{.IssueNumber}} --repo {{.RepoName}} --title "$title" --body-file "$b"
            rm -f "$f" "$b"
repoPaths: {}
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: delta
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
