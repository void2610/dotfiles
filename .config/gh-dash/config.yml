prSections:
    - title: All Open
      filters: is:open sort:updated-desc
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: All Open
      filters: is:open sort:updated-desc
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
        height: 0.6
        position: auto
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            labels:
                width: 22
                hidden: true
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    prs:
        # 組み込み checkout は固定 repoPaths しか見ないため、起動したリポジトリ ({{.RepoPath}}) で checkout するカスタムで C/Space 両方を上書きする。
        - key: C
          name: checkout
          command: cd {{.RepoPath}} && gh pr checkout {{.PrNumber}}
        - key: space
          name: checkout
          command: cd {{.RepoPath}} && gh pr checkout {{.PrNumber}}
        - key: m
          name: merge
          command: 'printf "Merge method [M/s/r]: "; read mm; case "$mm" in [sS]*) method=--squash ;; [rR]*) method=--rebase ;; *) method=--merge ;; esac; printf "Delete remote branch? [Y/n] "; read a; case "$a" in [nN]*) d= ;; *) d=--delete-branch ;; esac; gh pr merge --repo {{.RepoName}} {{.PrNumber}} $method $d'
        - key: e
          name: edit
          # Octo で PR を開く。番号→repo の順で repo を明示するため cwd 非依存。$NVIM を外しネスト警告を回避する。
          command: env -u NVIM nvim -c "Octo pr edit {{.PrNumber}} {{.RepoName}}"
    issues:
        - key: e
          name: edit
          # Octo で Issue を開く。番号→repo の順で repo を明示するため cwd 非依存。$NVIM を外しネスト警告を回避する。
          command: env -u NVIM nvim -c "Octo issue edit {{.IssueNumber}} {{.RepoName}}"
repoPaths: {}
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: delta
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
